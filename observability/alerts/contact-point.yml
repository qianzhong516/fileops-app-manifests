apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaContactPoint
metadata:
  name: oncall-email
spec:
  name: oncall-email
  instanceSelector:
    matchLabels:
      dashboards: grafana
  receivers:
    - type: email
      settings:
        subject: "[FileOps] Cluster CPU usage alert"
      valuesFrom:
        - targetPath: addresses
          valueFrom:
            secretKeyRef:
              name: alert-contact
              key: email
