apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: backend
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      serviceAccountName: backend-db-secrets
      containers:
        - image: 665303624691.dkr.ecr.ap-southeast-2.amazonaws.com/fileops-backend:b1511c366668f5d12f9583a7c2d8b104a46953c1
          name: fileops-backend
          env:
            - name: CORS_ORIGIN
              value: frontend-svc.default.svc.cluster.local
            - name: AWS_REGION
              value: ap-southeast-2
            - name: S3_BUCKET_NAME
              value: fileops-dev
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-access-key
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-access-key
                  key: AWS_SECRET_ACCESS_KEY
            - name: DB_HOST
              value: db.dev.filesops.com
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: fileopsdb
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: password
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: db-secrets
                  key: username
      volumes:
        - name:
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: db-secrets
