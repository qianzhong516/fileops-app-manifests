apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: backend
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - image: 665303624691.dkr.ecr.ap-southeast-2.amazonaws.com/fileops-backend:0fad9385198486ec801be9361fb821632533c64a
          name: fileops-backend
          env:
            - name: DATABASE_URL
              # TODO: inject db url and password here (from TF) - Creating ConfigMaps in TF
              value: database-1.cry0yoiwuh41.ap-southeast-2.rds.amazonaws.com
            - name: CORS_ORIGIN
              value: frontend-svc.default.svc.cluster.local
            - name: AWS_REGION
              value: ap-southeast-2
            - name: S3_BUCKET_NAME
              value: fileops-dev
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-access-key
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-access-key
                  key: AWS_SECRET_ACCESS_KEY
