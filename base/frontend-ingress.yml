apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    alb.ingress.kubernetes.io/group.name: fileops
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTPS":443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-2:665303624691:certificate/b95d049a-53eb-4145-8545-6961fd7487c9
  name: web-alb
spec:
  ingressClassName: alb
  rules:
    - host: filesops.com
      http:
        paths:
          - path: /
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
            pathType: Prefix
