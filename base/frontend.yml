apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frontend
  name: frontend
spec:
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - image: 665303624691.dkr.ecr.ap-southeast-2.amazonaws.com/fileops-frontend:dc18c47b8541a84e477ca2847d5dc6d244074fcb
          name: fileops-frontend
          resources:
            requests:
              cpu: 200m
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
