apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: frontend
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - image: 665303624691.dkr.ecr.ap-southeast-2.amazonaws.com/fileops-frontend:723d3d794b7878fd576a518e649369102230c3bf
          name: fileops-frontend
          resources:
            requests:
              cpu: 50m
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
        - name: load-generator
          image: busybox
          restartPolicy: never
          command: ["/bin/sh", "-c"]
          args:
            - while true; do wget -q -O- http://frontend-svc; sleep 0.01; done
          resources:
            requests:
              cpu: 50m
            limits:
              cpu: 200m
