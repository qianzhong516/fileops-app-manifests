apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: karpenter-infra
  namespace: argocd
spec:
  project: default

  sources:
    - repoURL: git@github.com:qianzhong516/fileops-app-manifests.git
      targetRevision: HEAD
      path: karpenter
      kustomize: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system

  syncPolicy:
    automated:
      prune: true
    syncOptions:
      - CreateNamespace=true
